<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pantry Smile — Food shelf operations, made simple</title>
  <meta name="description" content="Pantry Smile is day-of-operations software for food shelves — client check-in, donation weighing, volunteer shifts, and Second Harvest reporting on iPad.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0c1f38;
      --blue-deep: #1a4a7a;
      --blue-bright: #3d8fd4;
      --paper: #f8fbfd;
      --max: 1120px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Figtree, sans-serif;
      color: var(--paper);
      line-height: 1.55;
      font-size: 1.0625rem;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      background: var(--ink);
    }

    img { display: block; max-width: 100%; }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(100% - 2.5rem, var(--max));
      margin-inline: auto;
    }

    .nav {
      position: absolute;
      inset: 0 0 auto;
      z-index: 20;
      padding: 1.1rem 0;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .nav-brand img {
      width: 2.35rem;
      height: 2.35rem;
      padding: 0.15rem;
      border-radius: 50%;
      background: #152a45;
      object-fit: contain;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      background: rgba(248, 251, 253, 0.12);
      border: 1px solid rgba(248, 251, 253, 0.28);
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      transition: background 0.25s var(--ease), transform 0.25s var(--ease);
    }

    .nav-cta:hover {
      background: rgba(248, 251, 253, 0.22);
      transform: translateY(-1px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      padding: 5.5rem 0 2.75rem;
    }

    .hero-visual {
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 55% 80% at 88% 40%, rgba(61, 143, 212, 0.32), transparent 55%),
        linear-gradient(135deg, #0c1f38 0%, #1a4a7a 48%, #123556 100%);
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: clamp(1.5rem, 4vw, 3rem);
      align-items: center;
    }

    .hero-content {
      max-width: 34rem;
      padding: 0.5rem 0 0.75rem;
    }

    .hero-moose {
      width: min(100%, 380px);
      height: auto;
      margin-inline: auto;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.35));
      opacity: 0;
      animation: moose-in 1s var(--ease) 0.15s forwards;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: rise 0.9s var(--ease) 0.1s forwards;
    }

    .brand-mark img {
      width: 3.1rem;
      height: 3.1rem;
      padding: 0.18rem;
      border-radius: 50%;
      background: #152a45;
      object-fit: contain;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .brand-name {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 800;
      font-size: clamp(2.15rem, 5.5vw, 3.25rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.25);
    }

    .hero h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: clamp(1.35rem, 2.8vw, 1.85rem);
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 0.85rem;
      max-width: 20ch;
      opacity: 0;
      animation: rise 0.9s var(--ease) 0.25s forwards;
    }

    .hero-lede {
      font-size: 1.05rem;
      line-height: 1.55;
      color: rgba(248, 251, 253, 0.88);
      max-width: 36ch;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: rise 0.9s var(--ease) 0.4s forwards;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      opacity: 0;
      animation: rise 0.9s var(--ease) 0.55s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.35rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.98rem;
      border: 1px solid transparent;
      transition: transform 0.25s var(--ease), background 0.25s var(--ease);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--blue-bright);
      color: #fff;
      box-shadow: 0 10px 30px rgba(61, 143, 212, 0.4);
    }

    .btn-primary:hover { background: #2f7fc4; }

    @keyframes moose-in {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 820px) {
      .hero { padding: 5.25rem 0 2.25rem; }

      .hero-inner {
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }

      .hero-moose {
        order: -1;
        width: min(52%, 220px);
        margin-inline: auto 0;
      }

      .hero-content {
        max-width: none;
        padding: 0;
      }
    }

    @media (max-width: 520px) {
      .hero-moose { width: min(58%, 180px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .brand-mark, .hero h1, .hero-lede, .hero-actions, .hero-moose { opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a class="nav-brand" href="/" aria-label="Pantry Smile home">
        <img src="happy_moose.png" alt="" width="36" height="36">
        Pantry Smile
      </a>
      <a class="nav-cta" href="mailto:hello@pantrysmile.com?subject=Pantry%20Smile%20inquiry">Contact</a>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="Pantry Smile">
      <div class="hero-visual" aria-hidden="true"></div>
      <div class="wrap hero-inner">
        <div class="hero-content">
          <div class="brand-mark">
            <img src="happy_moose.png" alt="" width="56" height="56">
            <span class="brand-name">Pantry Smile</span>
          </div>
          <h1>Day-of operations for food shelves that move with kindness.</h1>
          <p class="hero-lede">Check in clients, weigh donations, track volunteers, and ship Second Harvest reports — from an iPad on the floor.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="mailto:hello@pantrysmile.com?subject=Pantry%20Smile%20inquiry">Talk with us</a>
          </div>
        </div>
        <img class="hero-moose" src="happy_moose.png" alt="" width="380" height="417" decoding="async">
      </div>
    </section>
  </main>
</body>
</html>
